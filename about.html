<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Storage Pickup Guide</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #111827);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 92%;
  max-width: 620px;
  background: rgba(17, 24, 39, 0.95);
  padding: 24px;
  border-radius: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  text-align: center;
  position: relative;
  overflow: hidden;
}

h1 {
  font-size: 20px;
  margin-bottom: 8px;
}

.sub {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 20px;
}

.step {
  font-size: 20px;
  min-height: 90px;
  margin: 30px 0;
  transition: all 0.3s ease;
}

.controls {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

#nextBtn { background: #22c55e; color: white; }
#backBtn { background: #3b82f6; color: white; }
#speakBtn { background: #f59e0b; color: black; }

#restartBtn {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  background: #ef4444;
  color: white;
  display: none;
}

/* Glass shatter */
.piece {
  position: absolute;
  width: 8px;
  height: 8px;
  background: rgba(255,255,255,0.6);
  animation: fly 0.5s forwards ease-out;
}

@keyframes fly {
  to {
    transform: translate(var(--x), var(--y)) rotate(720deg);
    opacity: 0;
  }
}

.footer {
  margin-top: 18px;
  font-size: 13px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

  <h1>Storage Unit Pickup Guide</h1>
  <div class="sub">Voice-enabled navigation system</div>

  <div id="stepText" class="step"></div>

  <div class="controls">
    <button id="backBtn">Back</button>
    <button id="speakBtn">🔊 Speak</button>
    <button id="nextBtn">Next</button>
  </div>

  <button id="restartBtn">Restart Guide</button>

  <div class="footer">
    Support: +1 (613) 302-2806
  </div>

</div>

<script>
const steps = [
"Enter the drive-in bay. The doors will open automatically.",
"Take a dolly from the bay area.",
"Enter the elevator and press Floor 2.",
"Walk straight toward section marked D.",
"Turn right in the D section.",
"Locate Unit D0220 above the lockers."
];

let index = 0;

const stepText = document.getElementById("stepText");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const speakBtn = document.getElementById("speakBtn");
const restartBtn = document.getElementById("restartBtn");

function showStep() {
  stepText.textContent = steps[index];
  speakStep();
}

/* VOICE ENGINE */
function speakStep() {
  const msg = new SpeechSynthesisUtterance(steps[index]);
  msg.rate = 1;
  msg.pitch = 1;
  msg.lang = "en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

/* GLASS EFFECT */
function shatter() {
  for (let i = 0; i < 18; i++) {
    const p = document.createElement("div");
    p.className = "piece";

    p.style.left = "50%";
    p.style.top = "45%";

    const x = (Math.random() - 0.5) * 500 + "px";
    const y = (Math.random() - 0.5) * 500 + "px";

    p.style.setProperty("--x", x);
    p.style.setProperty("--y", y);

    document.querySelector(".container").appendChild(p);
    setTimeout(() => p.remove(), 500);
  }
}

function update() {
  backBtn.disabled = index === 0;
}

/* BUTTONS */
nextBtn.onclick = () => {
  if (index < steps.length - 1) {
    shatter();
    setTimeout(() => {
      index++;
      showStep();
      update();
    }, 200);
  } else {
    stepText.textContent = "✔ Pickup Guide Completed";
    nextBtn.style.display = "none";
    restartBtn.style.display = "block";
    speechSynthesis.cancel();
  }
};

backBtn.onclick = () => {
  if (index > 0) {
    index--;
    showStep();
    update();
  }
};

speakBtn.onclick = () => {
  speakStep();
};

restartBtn.onclick = () => {
  index = 0;
  nextBtn.style.display = "inline-block";
  restartBtn.style.display = "none";
  showStep();
  update();
};

showStep();
update();
</script>

</body>
</html>
